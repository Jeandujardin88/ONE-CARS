document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ce;font-size:13px;color:#e2231a\">/ 04<\u002Fspan>\n          <span style=\"height:1px;flex:1;max-width:60px;background:rgba(226,35,26,0.5)\"><\u002Fspan>\n          <span style=\"font-family:'Sora';font-size:13px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(242,242,240,0.6)\">Conseils &amp; entretien<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-weight:800;font-size:clamp(26px,3.6vw,40px);letter-spacing:-0.02em;margin-bottom:14px;max-width:20ch\">Les questions que tout automobiliste se pose<\u002Fh2>\n        <p style=\"font-size:15px;line-height:1.6;color:rgba(242,242,240,0.6);max-width:60ch;margin:0 0 36px\">Nos réponses claires d'atelier — pour y voir plus clair sur votre climatisation, vos pneus et l'entretien de votre voiture. Un doute ? Passez nous voir à Colmar ou écrivez-nous.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <sc-for list=\"{{ guides }}\" as=\"g\" hint-placeholder-count=\"6\">\n            <div style=\"border:1px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;background:#121214;align-self:start\">\n              <button sc-camel-on-click=\"{{ g.onToggle }}\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:20px 22px;background:none;border:none;color:#f2f2f0;font-size:15.5px;font-weight:600;font-family:'Sora';text-align:left;cursor:pointer\">\n                <span style=\"display:flex;align-items:center;gap:12px\"><span style=\"font-size:20px\">{{ g.icon }}<\u002Fspan>{{ g.q }}<\u002Fspan>\n                <span style=\"{{ g.iconStyle }}\">+<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ g.open }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:0 22px 22px;font-size:14px;line-height:1.7;color:rgba(242,242,240,0.68)\">{{ g.a }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002F 60]], 2: [[9*60+30,12*60],[14*60,18*60]],\n      3: [[9*60+30,12*60],[14*60,18*60]], 4: [[9*60+30,12*60],[14*60,18*60]],\n      5: [[9*60+30,12*60],[14*60,18*60]], 6: [[10*60,15*60]], 0: [],\n    };\n    return (ranges[day] || []).some(([a,b]) => hm >= a && hm <= b);\n  }\n\n  renderVals() {\n    const setmore = this.props.setmore ?? 'https://onecars.setmore.com/';\n    const route = this.state.route;\n    const nav = (r, label) => ({\n      label,\n      onClick: () => this.setState({ route: r }),\n      style: 'background:none;border:none;cursor:pointer;padding:11px 16px;font-size:14px;color:' +\n        (route === r ? '#fff;box-shadow:inset 0 -2px 0 #e2231a' : 'rgba(242,242,240,0.6)'),\n    });\n\n    const open = this.isOpenNow(this.state.time);\n    const statusLabel = open ? 'Ouvert maintenant' : 'Fermé actuellement';\n    const statusColor = open ? '#3ddc84' : '#ff6b6b';\n\n    const hours = [\n      ['Lundi', '09:30 – 12:00 · 14:00 – 18:00', false],\n      ['Mardi', '09:30 – 12:00 · 14:00 – 18:00', false],\n      ['Mercredi', '09:30 – 12:00 · 14:00 – 18:00', false],\n      ['Jeudi', '09:30 – 12:00 · 14:00 – 18:00', false],\n      ['Vendredi', '09:30 – 12:00 · 14:00 – 18:00', false],\n      ['Samedi', '10:00 – 15:00', false],\n      ['Dimanche', 'Fermé', true],\n    ].map(([day, time, closed], i, arr) => ({\n      day, time,\n      color: closed ? 'rgba(242,242,240,0.4)' : 'rgba(242,242,240,0.78)',\n      row: 'display:flex;justify-content:space-between;align-items:center;padding:16px 22px;font-size:14.5px' +\n        (i < arr.length - 1 ? ';border-bottom:1px solid rgba(255,255,255,0.07)' : '') +\n        (closed ? ';background:rgba(255,255,255,0.015)' : ''),\n    }));\n\n    const faqDefs = [\n      { q: 'Faites-vous aussi la mécanique courante ?', a: 'Oui — vidange, freinage, batterie, diagnostic, décalaminage… Pneus et clim sont nos spécialités, mais l\\u2019entretien du quotidien fait pleinement partie de nos prestations.' },\n      { q: 'Puis-je acheter mes pneus ailleurs et venir pour le montage ?', a: 'Oui, nous montons vos pneus quelle que soit leur provenance : montage & équilibrage 15 € dans ce cas (10 € pour des pneus achetés chez nous).' },\n      { q: 'Combien de temps dure une recharge de climatisation ?', a: 'Comptez environ 45 minutes pour un diagnostic complet et une recharge de gaz.' },\n      { q: 'Le technicien peut-il venir recharger ma clim sur place ?', a: 'Oui ! Notre service mobile climatisation se déplace à domicile ou sur votre lieu de travail, partout dans le Grand Est autour de Colmar. Contactez-nous sur WhatsApp pour organiser un passage.' },\n      { q: 'Faut-il un compte pour réserver sur Setmore ?', a: 'Non, aucune inscription n\\u2019est nécessaire — choisissez un créneau et confirmez avec votre email.' },\n      { q: 'Que faites-vous des pneus usagés ?', a: 'Nous les reprenons pour recyclage : 2 € par pneu.' },\n    ];\n    const faqs = faqDefs.map((f, i) => {\n      const isOpen = this.state.faqOpen === i;\n      return {\n        ...f, open: isOpen,\n        onToggle: () => this.setState(s => ({ faqOpen: s.faqOpen === i ? -1 : i })),\n        iconStyle: 'transition:transform .2s ease;transform:rotate(' + (isOpen ? '45deg' : '0') + ');color:#e2231a;font-size:18px;flex:none',\n      };\n    });\n\n    const whatsapp = 'https://wa.me/33768810434';\n    const snapchat = 'https://snapchat.com/t/14d2nBWD';\n    const answers = {\n      horaires: 'Nous sommes ouverts du lundi au vendredi 09:30–12:00 et 14:00–18:00, le samedi 10:00–15:00. Fermé le dimanche.',\n      pneus: 'Changement de pneu dès 15 € (13″) jusqu\\u2019à 45 € (18″), 19″–22″ sur devis. Montage & équilibrage 10 € (15 € si pneus achetés ailleurs), recyclage 2 €/pneu.',\n      clim: 'On recharge les deux fluides : R134a (bouchon noir, avant 2016) et R1234yf (bouchon gris, obligatoire sur les neufs depuis 2017). Comptez ~45 min. Un contrôle tous les 2 ans est conseillé.',\n      adresse: 'One Cars — 7 Rue des Belges, 68000 Colmar. Parking sur place.',\n      rdv: 'Le plus simple : réservez votre créneau en ligne sur notre agenda Setmore (dispos en temps réel, confirmation immédiate). Vous pouvez aussi nous écrire sur WhatsApp au 07 68 81 04 34.',\n    };\n    const ctaFor = { rdv: { label: 'Réserver en ligne →', href: setmore } };\n    const pushChat = (label, key) => this.setState(s => ({\n      chatLog: [...s.chatLog, { from: 'user', text: label }, { from: 'bot', text: answers[key], cta: ctaFor[key] || null }],\n    }));\n    const chatLog = this.state.chatLog.map(m => {\n      const bot = m.from === 'bot';\n      return {\n        text: m.text,\n        hasCta: !!m.cta,\n        ctaLabel: m.cta ? m.cta.label : '',\n        ctaHref: m.cta ? m.cta.href : '#',\n        wrap: 'display:flex;flex-direction:column;align-items:' + (bot ? 'flex-start' : 'flex-end'),\n        bubble: 'max-width:82%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.5;' +\n          (bot\n            ? 'background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(242,242,240,0.9);border-bottom-left-radius:4px'\n            : 'background:#e2231a;color:#fff;border-bottom-right-radius:4px'),\n      };\n    });\n\n    const guideDefs = [\n      { icon: '❄️', q: 'Comment savoir quel gaz de clim j\\u2019ai ?', a: 'Repérez le bouchon de valve sous le capot : bouchon NOIR = R134a (voitures mises en circulation avant 2016), bouchon GRIS = R1234yf (obligatoire sur les véhicules neufs depuis 2017). En cas de doute, l\\u2019année de première immatriculation sur la carte grise donne déjà une bonne indication — et nous identifions le bon fluide pour vous en atelier.' },\n      { icon: '💧', q: 'Comment repérer un début de fuite de climatisation ?', a: 'Les signes qui doivent alerter : la clim souffle moins froid qu\\u2019avant, elle met plus de temps à rafraîchir, vous devez la recharger tous les ans, ou une odeur d\\u2019humidité apparaît. Une clim perd naturellement ~10 % de gaz par an ; au-delà, il y a souvent une micro-fuite (joint, condenseur, tuyau). On la localise avec un traceur UV ou un détecteur électronique avant toute recharge — recharger sans réparer la fuite, c\\u2019est jeter l\\u2019argent.' },\n      { icon: '🗓️', q: 'Quel est le meilleur moment pour changer ses pneus ?', a: 'Changez dès que la gomme atteint 1,6 mm (témoin d\\u2019usure légal) — mais en pratique on conseille dès 3 mm pour garder de l\\u2019adhérence sous la pluie. Pour les pneus hiver/toutes-saisons, le repère est « avant la Toussaint » (dès que les températures passent sous 7 °C). En Alsace, avec la Loi Montagne dans les zones concernées, mieux vaut anticiper l\\u2019automne. Changez toujours par paire sur le même essieu.' },\n      { icon: '🔧', q: 'Quel entretien faut-il prioriser ?', a: 'Dans l\\u2019ordre de sécurité et de coût évité : 1) les freins (plaquettes/disques) — vital ; 2) les pneus — seul contact avec la route ; 3) la vidange + filtres aux intervalles constructeur — protège le moteur ; 4) la batterie (3 à 5 ans de durée de vie) ; 5) la clim tous les 2 ans. Négliger la vidange ou la distribution coûte bien plus cher qu\\u2019un entretien régulier.' },\n      { icon: '📉', q: 'Ma clim souffle moins froid, faut-il forcément recharger ?', a: 'Pas toujours. Avant de recharger, on vérifie le filtre d\\u2019habitacle (souvent encrassé), le bon fonctionnement du compresseur et l\\u2019absence de fuite. Si le circuit est étanche et le niveau correct, une simple désinfection + filtre neuf peut suffire. Sinon, recharge du bon gaz. On vous dit toujours ce qui est réellement nécessaire, devis à l\\u2019appui.' },\n      { icon: '🌀', q: 'À quoi sert le décalaminage hydrogène ?', a: 'Avec le temps, la calamine s\\u2019accumule dans le moteur, la vanne EGR et le filtre à particules (FAP), surtout sur les trajets courts en ville. Le décalaminage hydrogène nettoie ces dépôts sans démontage : moteur plus souple, consommation et fumées réduites, voyants moteur qui peuvent s\\u2019éteindre. Idéal en entretien préventif ou avant un contrôle technique.' },\n    ];\n    const guides = guideDefs.map((g, i) => {\n      const isOpen = this.state.guideOpen === i;\n      return {\n        ...g, open: isOpen,\n        onToggle: () => this.setState(s => ({ guideOpen: s.guideOpen === i ? -1 : i })),\n        iconStyle: 'transition:transform .2s ease;transform:rotate(' + (isOpen ? '45deg' : '0') + ');color:#e2231a;font-size:20px;flex:none',\n      };\n    });\n\n    return {\n      setmore,\n      whatsapp,\n      snapchat,\n      chatOpen: this.state.chatOpen,\n      chatIcon: this.state.chatOpen ? '×' : '💬',\n      toggleChat: () => this.setState(s => ({ chatOpen: !s.chatOpen })),\n      chatLog,\n      chatQuick: [\n        { label: 'Horaires', onClick: () => pushChat('Vos horaires ?', 'horaires') },\n        { label: 'Prix pneus', onClick: () => pushChat('Le prix pour changer un pneu ?', 'pneus') },\n        { label: 'Recharge clim', onClick: () => pushChat('Vous faites la recharge de clim ?', 'clim') },\n        { label: 'Adresse', onClick: () => pushChat('Où êtes-vous ?', 'adresse') },\n        { label: 'Prendre RDV', onClick: () => pushChat('Comment prendre rendez-vous ?', 'rdv') },\n      ],\n      isHome: route === 'home',\n      isReservation: route === 'reservation',\n      isHoraires: route === 'horaires',\n      isContact: route === 'contact',\n      goHome: () => this.setState({ route: 'home' }),\n      goReservation: () => this.setState({ route: 'reservation' }),\n      navItems: [\n        nav('home', 'Accueil'),\n        nav('reservation', 'Réservation'),\n        nav('horaires', 'Horaires'),\n        nav('contact', 'Contact'),\n      ],\n      doorStyle: this.state.doorDone\n        ? 'display:none'\n        : 'position:fixed;inset:0;z-index:200;background:linear-gradient(180deg,#17171a,#0a0a0b);animation:doorlift .8s cubic-bezier(.7,0,.3,1) forwards',\n      statusLabel, statusColor,\n      timeNow: this.state.time.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),\n      heroFacts: [\n        { icon: '📅', title: 'Sur rendez-vous', desc: 'Réservation en ligne 24h/24 via Setmore.' },\n        { icon: '🚐', title: 'Technicien à domicile', desc: 'Recharge clim possible directement chez vous.' },\n        { icon: '🏷️', title: 'Toutes marques', desc: 'Premium et budget, neuf & occasion.' },\n        { icon: '💳', title: 'Paiement CB', desc: 'Carte, espèces — parking gratuit sur place.' },\n      ],\n      guides: guides,\n      brandGroups: [\n        { title: 'Pneumatiques', items: ['Michelin','Continental','Goodyear','Bridgestone','Pirelli','Hankook','Dunlop','Kleber'] },\n        { title: 'Climatisation & refroidissement', items: ['Valeo','Behr','Nissens','Denso','Hella'] },\n        { title: 'Freinage', items: ['Bosch','Brembo','Ferodo','TRW','ATE'] },\n        { title: 'Filtration & entretien', items: ['Mann-Filter','Mahle','Bosch','Motul','Total','Elf'] },\n        { title: 'Batteries & électrique', items: ['Varta','Bosch','Exide','NGK'] },\n      ],\n      tireTariffs: [\n        { size: '13″', price: '15€' },\n        { size: '14″', price: '20€' },\n        { size: '15″', price: '25€' },\n        { size: '16″', price: '30€' },\n        { size: '17″', price: '40€' },\n        { size: '18″', price: '45€' },\n        { size: '19″–22″', price: 'devis' },\n      ],\n      mecanique: [\n        { icon: '🛢️', title: 'Vidange & filtres', desc: 'Huile moteur, filtres à huile, air et habitacle.' },\n        { icon: '🛑', title: 'Freinage', desc: 'Plaquettes, disques, purge du liquide de frein.' },\n        { icon: '💨', title: 'Décalaminage hydrogène', desc: 'FAP, EGR, injecteurs — nettoyage sans démontage.' },\n        { icon: '🔍', title: 'Diagnostic électronique', desc: 'Lecture et effacement des codes défauts, voyants.' },\n        { icon: '🔋', title: 'Batterie & démarrage', desc: 'Test, remplacement et mise en route.' },\n        { icon: '💡', title: 'Petits travaux', desc: 'Ampoules, essuie-glaces, niveaux, contrôles avant CT.' },\n      ],\n      marqueeItems: ['PNEUS NEUFS & OCCASION','RECHARGE CLIM R1234yf','TECHNICIEN CLIM À DOMICILE','DÉCALAMINAGE HYDROGÈNE','TOUT LE GRAND EST','PNEUS NEUFS & OCCASION','RECHARGE CLIM R1234yf','TECHNICIEN CLIM À DOMICILE','DÉCALAMINAGE HYDROGÈNE','TOUT LE GRAND EST'],\n      steps: [\n        { n: '01', title: 'Choisissez le service', desc: 'Pneus, climatisation ou mécanique courante.' },\n        { n: '02', title: 'Sélectionnez un créneau', desc: 'Disponibilités en temps réel sur l\\u2019agenda.' },\n        { n: '03', title: 'Confirmez', desc: 'Vous recevez une confirmation par email/SMS.' },\n      ],\n      faqs,\n      hours,\n      infos: [\n        { icon: '📍', title: 'Adresse', body: '7 Rue des Belges, 68000 Colmar' },\n        { icon: '☎️', title: 'Téléphone', body: '07 68 81 04 34' },\n        { icon: '💬', title: 'WhatsApp', body: '06 75 47 07 00' },\n        { icon: '👻', title: 'Snapchat', body: 'CLIMAUTO6867' },\n        { icon: '📱', title: 'Réseaux', body: 'ONE-CARS68 · onecars.colmar' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
